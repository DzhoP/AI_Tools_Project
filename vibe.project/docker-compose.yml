services:
  app:
    build: .
    container_name: vibe_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]   # проверява дали PHP-FPM конфигурацията е валидна
      interval: 30s                     # проверява на всеки 30 секунди
      timeout: 10s                      # изчаква максимум 10 секунди за отговор
      retries: 3                        # след 3 неуспешни опита → unhealthy
      start_period: 10s                 # изчаква 10 секунди след старт преди да започне проверките

  nginx:
    image: nginx:alpine
    container_name: vibe_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy     # стартира само ако app е healthy
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]  # прави HTTP заявка към себе си
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: vibe_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vibe_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: vibe_user
      MYSQL_PASSWORD: secret
    volumes:
      - vibe_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]  # пита MySQL жив ли е
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s              # MySQL се нуждае от повече време при първи старт

  redis:
    image: redis:7-alpine
    container_name: vibe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nextjs:
    image: node:20-alpine
    container_name: vibe_nextjs
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../vibe-frontend:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      WATCHPACK_POLLING: "true"       # enables HMR when files arrive via docker cp
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev"
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]  # проверява дали Next.js отговаря
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s             # Next.js се нуждае от време за компилация

networks:
  vibe_network:
    driver: bridge

volumes:
  vibe_mysql_data:
